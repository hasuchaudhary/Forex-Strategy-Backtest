name: Forex Strategy Backtest

on: [push, workflow_dispatch]

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        # અહીં નવી yfinance અને pandas લાઈબ્રેરી ઉમેરી છે
        run: pip install backtrader yfinance pandas
        
      - name: Run Backtest
        run: python strategy.py
