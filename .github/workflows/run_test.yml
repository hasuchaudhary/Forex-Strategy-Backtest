name: Forex Strategy Backtest

# જ્યારે પણ તમે નવો કોડ મુકશો અથવા જાતે બટન દબાવશો ત્યારે આ રન થશે
on: [push, workflow_dispatch]

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Backtest
        run: python strategy.py
